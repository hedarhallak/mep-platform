<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Employee Sign Up</title>
  <link rel="stylesheet" href="/app.css" />
  <style>
    body { max-width: 760px; margin: 0 auto; padding: 16px; }
    .card { border: 1px solid #ddd; border-radius: 12px; padding: 16px; margin-top: 16px; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; }
    .row > div { flex: 1 1 220px; }
    label { display:block; font-weight:600; margin-bottom:6px; }
    input { width:100%; padding:10px; border-radius:10px; border:1px solid #ccc; }
    button { padding:10px 14px; border-radius:10px; border:1px solid #333; cursor:pointer; }
    .muted { opacity:0.8; font-size: 14px; }
    pre { white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <h1>Employee Sign Up</h1>
  <p class="muted">This sign up is restricted to employees. You must have a valid Invite Code from your admin.</p>

  <div class="card">
    <div class="row">
      <div>
        <label>Invite Code</label>
        <input id="invite_code" placeholder="Enter invite code" />
      </div>
      <div>
        <label>Username</label>
        <input id="username" placeholder="Choose a username" />
      </div>
      <div>
        <label>PIN</label>
        <input id="pin" type="password" placeholder="Choose a PIN" />
      </div>
    </div>

    <div style="margin-top:12px;">
      <button id="btnSignup">Create account</button>
      <span id="status" class="muted" style="margin-left:10px;"></span>
    </div>

    <pre id="out" style="margin-top:12px;"></pre>
  </div>

  <script src="/signup_invite.js"></script>
</body>
</html>
