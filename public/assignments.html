<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignments — MEP Platform</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f1f5f9; color: #1e293b; }

  .topbar { background: #1e293b; color: #fff; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar-brand { font-weight: 700; font-size: 15px; }
  .topbar-back { color: #94a3b8; font-size: 13px; cursor: pointer; text-decoration: none; }
  .topbar-back:hover { color: #fff; }
  .topbar-user  { font-size: 13px; color: #94a3b8; }

  .main { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }

  .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: #fff; border: 1px solid #e2e8f0; border-radius: 10px; padding: 4px; width: fit-content; }
  .tab { padding: 7px 18px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: none; color: #64748b; transition: all 0.15s; }
  .tab.active { background: #6366f1; color: #fff; }

  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .page-title { font-size: 20px; font-weight: 700; }

  .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .filters select { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 12px; font-size: 13px; color: #1e293b; outline: none; }

  .table-wrap { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: #f8fafc; }
  th { padding: 11px 16px; text-align: left; font-size: 11px; color: #64748b; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid #e2e8f0; font-weight: 600; }
  td { padding: 13px 16px; font-size: 14px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }
  .empty { text-align: center; padding: 48px; color: #94a3b8; font-size: 14px; }

  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-APPROVED  { background: #dcfce7; color: #15803d; }
  .badge-PENDING   { background: #fef9c3; color: #854d0e; }
  .badge-REJECTED  { background: #fee2e2; color: #b91c1c; }
  .badge-CANCELLED { background: #f1f5f9; color: #475569; }

  .btn-primary   { background: #6366f1; color: #fff; border: none; border-radius: 8px; padding: 10px 18px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-primary:hover { background: #4f46e5; }
  .btn-secondary { background: #fff; color: #475569; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 18px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-sm        { padding: 5px 11px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid; font-weight: 500; }
  .btn-approve   { color: #15803d; border-color: #bbf7d0; background: #dcfce7; }
  .btn-reject    { color: #b91c1c; border-color: #fecaca; background: #fff; }
  .btn-cancel    { color: #64748b; border-color: #e2e8f0; background: #fff; }
  .action-btns   { display: flex; gap: 6px; }

  /* Modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: #fff; border-radius: 14px; width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto; padding: 28px; transform: translateY(16px); transition: transform 0.2s; }
  .overlay.open .modal { transform: translateY(0); }
  .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid .full { grid-column: 1 / -1; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 6px; }
  .field input, .field select, .field textarea { width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 9px 12px; font-size: 14px; color: #1e293b; outline: none; font-family: inherit; }
  .field input:focus, .field select:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }

  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
  .alert { border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-top: 12px; display: none; }
  .alert-error { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }

  /* Reject modal */
  .reject-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .reject-overlay.open { opacity: 1; pointer-events: all; }
  .reject-modal { background: #fff; border-radius: 14px; width: 400px; max-width: 95vw; padding: 28px; }
  .reject-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #b91c1c; }
  .reject-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
  .btn-danger { background: #ef4444; color: #fff; border: none; border-radius: 8px; padding: 10px 18px; font-size: 13px; font-weight: 600; cursor: pointer; }

  .shift-badge { font-size: 12px; color: #6366f1; background: #eef2ff; padding: 2px 8px; border-radius: 4px; font-family: monospace; }
  .info-row { font-size: 12px; color: #94a3b8; margin-top: 2px; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a class="topbar-back" href="/app.html">← Back</a>
    <div class="topbar-brand">Assignments</div>
  </div>
  <div class="topbar-user" id="topbar-user"></div>
</div>

<div class="main">
  <div class="page-header">
    <div>
      <div class="page-title">Assignments</div>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn-secondary" onclick="window.location.href='/map-assignments.html'">🗺️ Map View</button>
      <button class="btn-primary" id="btn-add" onclick="openAdd()" style="display:none">+ New Assignment</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('active')">Active</button>
    <button class="tab" onclick="switchTab('requests')" id="tab-requests">Requests</button>
  </div>

  <!-- Active Assignments -->
  <div id="view-active">
    <div class="filters">
      <select id="filter-project" onchange="loadActive()">
        <option value="">All Projects</option>
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Employee</th><th>Project</th><th>Shift</th>
            <th>Start</th><th>End</th><th>Assigned By</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="active-tbody"><tr><td colspan="7" class="empty">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- Requests -->
  <div id="view-requests" style="display:none">
    <div class="filters">
      <select id="filter-req-status" onchange="loadRequests()">
        <option value="">All Statuses</option>
        <option value="PENDING">Pending</option>
        <option value="APPROVED">Approved</option>
        <option value="REJECTED">Rejected</option>
        <option value="CANCELLED">Cancelled</option>
      </select>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Employee</th><th>Project</th><th>Shift</th>
            <th>Period</th><th>Status</th><th>Requested By</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="requests-tbody"><tr><td colspan="7" class="empty">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Add Assignment Modal -->
<div class="overlay" id="modal">
  <div class="modal">
    <div class="modal-title">New Assignment Request</div>
    <div class="form-grid">
      <div class="field full">
        <label>Employee *</label>
        <select id="f-employee"></select>
      </div>
      <div class="field full">
        <label>Project *</label>
        <select id="f-project"></select>
      </div>
      <div class="field">
        <label>Start Date *</label>
        <input type="date" id="f-start">
      </div>
      <div class="field">
        <label>End Date *</label>
        <input type="date" id="f-end">
      </div>
      <div class="field">
        <label>Shift Start *</label>
        <select id="f-shift-start"></select>
      </div>
      <div class="field">
        <label>Shift End *</label>
        <select id="f-shift-end"></select>
      </div>
      <div class="field full">
        <label>Notes</label>
        <input type="text" id="f-notes" placeholder="Optional notes">
      </div>
    </div>
    <div class="alert alert-error" id="modal-error"></div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveAssignment()">Submit</button>
    </div>
  </div>
</div>

<!-- Reject Modal -->
<div class="reject-overlay" id="reject-modal">
  <div class="reject-modal">
    <div class="reject-title">Reject Request</div>
    <div class="field">
      <label>Reason (optional)</label>
      <input type="text" id="reject-reason" placeholder="e.g. Employee not available">
    </div>
    <div class="reject-footer">
      <button class="btn-secondary" onclick="closeRejectModal()">Cancel</button>
      <button class="btn-danger" onclick="confirmReject()">Reject</button>
    </div>
  </div>
</div>

<script>
  const token = localStorage.getItem('mep_token') || localStorage.getItem('token');
  let userRole  = null;
  let activeTab = 'active';
  let rejectingId = null;
  let timeslots = [];
  let projects  = [];
  let employees = [];
  let defaultShiftStart = '06:00';
  let defaultShiftEnd   = '14:30';

  if (!token) window.location.href = '/login.html';

  async function api(method, path, body) {
    const res = await fetch('/api' + path, {
      method,
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: body ? JSON.stringify(body) : undefined,
    });
    return res.json();
  }

  async function init() {
    const whoami = await api('GET', '/auth/whoami');
    if (!whoami.ok) { window.location.href = '/login.html'; return; }
    userRole = whoami.user.role;
    document.getElementById('topbar-user').textContent = whoami.user.username + ' (' + userRole + ')';

    // Show add button for ADMIN and PM
    if (['ADMIN','PM'].includes(userRole))
      document.getElementById('btn-add').style.display = 'block';

    // Load timeslots
    const tsRes = await api('GET', '/assignments/timeslots');
    if (tsRes.ok) timeslots = tsRes.slots;

    // Load default shift times for this company
    const defRes = await api('GET', '/assignments/defaults');
    if (defRes.ok) {
      defaultShiftStart = defRes.shift_start?.slice(0,5) || '06:00';
      defaultShiftEnd   = defRes.shift_end?.slice(0,5)   || '14:30';
    }

    // Load employees
    const empRes = await api('GET', '/assignments/employees');
    if (empRes.ok) employees = empRes.employees;

    // Load active projects for filter + modal
    const projRes = await api('GET', '/projects?status=ACTIVE');
    if (projRes.ok) {
      projects = projRes.projects;
      const fProj = document.getElementById('filter-project');
      projects.forEach(p => fProj.innerHTML += `<option value="${p.id}">${esc(p.project_code)} — ${esc(p.project_name)}</option>`);
    }

    loadActive();
  }

  function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i === (tab === 'active' ? 0 : 1)));
    document.getElementById('view-active').style.display   = tab === 'active'   ? '' : 'none';
    document.getElementById('view-requests').style.display = tab === 'requests' ? '' : 'none';
    if (tab === 'requests') loadRequests();
  }

  async function loadActive() {
    const projId = document.getElementById('filter-project').value;
    let url = '/assignments';
    if (projId) url += '?project_id=' + projId;

    const data  = await api('GET', url);
    const tbody = document.getElementById('active-tbody');

    if (!data.ok || !data.assignments.length) {
      tbody.innerHTML = `<tr><td colspan="7" class="empty">No active assignments</td></tr>`;
      return;
    }

    tbody.innerHTML = data.assignments.map(a => `
      <tr>
        <td>
          <strong>${esc(a.employee_name)}</strong>
          <div class="info-row">${esc(a.trade_code || '')} · ${esc(a.rank_code || '')}</div>
        </td>
        <td>
          <strong>${esc(a.project_code)}</strong>
          <div class="info-row">${esc(a.project_name)}</div>
        </td>
        <td><span class="shift-badge">${fmtTime(a.shift_start)} – ${fmtTime(a.shift_end)}</span></td>
        <td style="font-size:13px">${fmtDate(a.start_date)}</td>
        <td style="font-size:13px">${fmtDate(a.end_date)}</td>
        <td style="font-size:13px;color:#64748b">${esc(a.assigned_by || '')}</td>
        <td>
          ${userRole === 'ADMIN' ? `
            <button class="btn-sm btn-cancel" onclick="cancelAssignment(${a.id})">Cancel</button>
          ` : '—'}
        </td>
      </tr>
    `).join('');
  }

  async function loadRequests() {
    const status = document.getElementById('filter-req-status').value;
    let url = '/assignments/requests';
    if (status) url += '?status=' + status;

    const data  = await api('GET', url);
    const tbody = document.getElementById('requests-tbody');

    if (!data.ok || !data.requests.length) {
      tbody.innerHTML = `<tr><td colspan="7" class="empty">No requests found</td></tr>`;
      return;
    }

    tbody.innerHTML = data.requests.map(r => `
      <tr>
        <td><strong>${esc(r.employee_name)}</strong><div class="info-row">${esc(r.employee_trade||'')}</div></td>
        <td><strong>${esc(r.project_code)}</strong><div class="info-row">${esc(r.project_name)}</div></td>
        <td><span class="shift-badge">${fmtTime(r.shift_start)} – ${fmtTime(r.shift_end)}</span></td>
        <td style="font-size:13px">${fmtDate(r.start_date)}<br><span style="color:#94a3b8">→ ${fmtDate(r.end_date)}</span></td>
        <td><span class="badge badge-${esc(r.status)}">${esc(r.status)}</span>${r.decision_note ? `<div class="info-row">${esc(r.decision_note)}</div>` : ''}</td>
        <td style="font-size:13px;color:#64748b">${esc(r.requested_by_name||'')}</td>
        <td>
          <div class="action-btns">
            ${userRole === 'ADMIN' && r.status === 'PENDING' ? `
              <button class="btn-sm btn-approve" onclick="approveRequest(${r.id})">Approve</button>
              <button class="btn-sm btn-reject"  onclick="openReject(${r.id})">Reject</button>
            ` : ''}
            ${r.status === 'PENDING' ? `
              <button class="btn-sm btn-cancel" onclick="cancelRequest(${r.id})">Cancel</button>
            ` : '—'}
          </div>
        </td>
      </tr>
    `).join('');
  }

  function openAdd() {
    // Populate employees
    const eSel = document.getElementById('f-employee');
    eSel.innerHTML = '<option value="">Select employee...</option>';
    employees.forEach(e => eSel.innerHTML += `<option value="${e.id}">${esc(e.full_name)} (${esc(e.trade_code)})</option>`);

    // Populate projects (ACTIVE only)
    const pSel = document.getElementById('f-project');
    pSel.innerHTML = '<option value="">Select project...</option>';
    projects.forEach(p => pSel.innerHTML += `<option value="${p.id}">${esc(p.project_code)} — ${esc(p.project_name)}</option>`);

    // Populate timeslots
    const ssSel = document.getElementById('f-shift-start');
    const seSel = document.getElementById('f-shift-end');
    ssSel.innerHTML = '';
    seSel.innerHTML = '';
    timeslots.forEach(t => {
      ssSel.innerHTML += `<option value="${t.value}">${t.label}</option>`;
      seSel.innerHTML += `<option value="${t.value}">${t.label}</option>`;
    });

    // Default shift times from company settings
    ssSel.value = defaultShiftStart;
    seSel.value = defaultShiftEnd;

    // Default dates: tomorrow for both start and end
    const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
    const tomorrowStr = tomorrow.toISOString().slice(0,10);
    document.getElementById('f-start').value = tomorrowStr;
    document.getElementById('f-end').value   = tomorrowStr;
    document.getElementById('f-notes').value = '';
    document.getElementById('modal-error').style.display = 'none';
    document.getElementById('modal').classList.add('open');
  }

  function closeModal() { document.getElementById('modal').classList.remove('open'); }

  async function saveAssignment() {
    const errEl = document.getElementById('modal-error');
    errEl.style.display = 'none';

    const body = {
      employee_id:  parseInt(document.getElementById('f-employee').value)    || null,
      project_id:   parseInt(document.getElementById('f-project').value)     || null,
      start_date:   document.getElementById('f-start').value,
      end_date:     document.getElementById('f-end').value,
      shift_start:  document.getElementById('f-shift-start').value,
      shift_end:    document.getElementById('f-shift-end').value,
      notes:        document.getElementById('f-notes').value.trim() || null,
    };

    if (!body.employee_id) { showErr(errEl, 'Employee is required'); return; }
    if (!body.project_id)  { showErr(errEl, 'Project is required');  return; }
    if (!body.start_date)  { showErr(errEl, 'Start date is required'); return; }
    if (!body.end_date)    { showErr(errEl, 'End date is required');   return; }

    const data = await api('POST', '/assignments/requests', body);

    if (!data.ok) {
      const msgs = {
        PROJECT_NOT_ACTIVE:          'Project is not active',
        EMPLOYEE_ALREADY_ASSIGNED:   data.message || 'Employee already assigned',
        EMPLOYEE_HAS_PENDING_REQUEST: data.message || 'Employee has a pending request',
        END_DATE_BEFORE_START:       'End date must be after start date',
      };
      showErr(errEl, msgs[data.error] || data.error);
      return;
    }

    closeModal();
    if (data.auto_approved) {
      loadActive();
      switchTab('active');
    } else {
      switchTab('requests');
    }
  }

  async function approveRequest(id) {
    const data = await api('PATCH', `/assignments/requests/${id}/approve`);
    if (!data.ok) { alert(data.error); return; }
    loadRequests();
    loadActive();
  }

  function openReject(id) {
    rejectingId = id;
    document.getElementById('reject-reason').value = '';
    document.getElementById('reject-modal').classList.add('open');
  }

  function closeRejectModal() {
    document.getElementById('reject-modal').classList.remove('open');
  }

  async function confirmReject() {
    const reason = document.getElementById('reject-reason').value.trim();
    const data   = await api('PATCH', `/assignments/requests/${rejectingId}/reject`, { reason });
    if (!data.ok) { alert(data.error); return; }
    closeRejectModal();
    loadRequests();
  }

  async function cancelRequest(id) {
    if (!confirm('Cancel this request?')) return;
    const data = await api('PATCH', `/assignments/requests/${id}/cancel`);
    if (!data.ok) { alert(data.error); return; }
    loadRequests();
  }

  async function cancelAssignment(id) {
    if (!confirm('Cancel this assignment?')) return;
    const data = await api('PATCH', `/assignments/requests/${id}/cancel`);
    if (!data.ok) { alert(data.message || data.error); return; }
    loadActive();
  }

  // Helpers
  function showErr(el, msg) { el.textContent = msg; el.style.display = 'block'; }
  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function fmtDate(iso) { if (!iso) return '—'; return new Date(iso).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }); }
  function fmtTime(t) { if (!t) return '—'; return t.slice(0,5); }

  document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });
  document.getElementById('reject-modal').addEventListener('click', e => { if (e.target === document.getElementById('reject-modal')) closeRejectModal(); });

  init();
</script>
</body>
</html>
