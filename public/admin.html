<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEP Admin Console</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0f;
    --surface:  #111118;
    --border:   #1e1e2e;
    --accent:   #f97316;
    --accent2:  #fb923c;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --success:  #22c55e;
    --danger:   #ef4444;
    --warning:  #f59e0b;
    --mono:     'DM Mono', monospace;
    --sans:     'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Login Screen ─────────────────────── */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(ellipse 60% 40% at 70% 20%, rgba(249,115,22,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 20% 80%, rgba(249,115,22,0.06) 0%, transparent 50%),
      var(--bg);
  }

  .login-box {
    width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    position: relative;
    overflow: hidden;
  }

  .login-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .login-logo {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .login-title {
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.1;
  }

  .login-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 32px;
    font-family: var(--mono);
  }

  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 14px;
    font-family: var(--mono);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus { border-color: var(--accent); }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 13px;
    font-size: 14px;
    font-family: var(--sans);
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 8px;
  }

  .btn-primary:hover  { background: var(--accent2); }
  .btn-primary:active { transform: scale(0.98); }

  .error-msg {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    font-family: var(--mono);
    color: var(--danger);
    margin-top: 12px;
    display: none;
  }

  /* ── Dashboard ────────────────────────── */
  #dashboard { display: none; }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .topbar-brand {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .topbar-right { display: flex; align-items: center; gap: 16px; }

  .topbar-user {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--muted);
  }

  .btn-logout {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 12px;
    font-family: var(--mono);
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

  .main { padding: 32px; max-width: 1200px; margin: 0 auto; }

  /* ── Stats row ────────────────────────── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transition: transform 0.3s;
  }

  .stat-card:hover::after { transform: scaleX(1); }

  .stat-label {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 36px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
  }

  .stat-value.orange { color: var(--accent); }

  /* ── Section header ───────────────────── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .section-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }

  .btn-add {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 13px;
    font-family: var(--sans);
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-add:hover { background: var(--accent2); }

  /* ── Companies table ──────────────────── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; }

  thead { background: rgba(249,115,22,0.05); }

  th {
    padding: 12px 20px;
    text-align: left;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 16px 20px;
    font-size: 14px;
    border-bottom: 1px solid rgba(30,30,46,0.5);
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(249,115,22,0.03); }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-family: var(--mono);
    font-weight: 500;
    letter-spacing: 1px;
  }

  .badge-active    { background: rgba(34,197,94,0.1);  color: var(--success); border: 1px solid rgba(34,197,94,0.2); }
  .badge-suspended { background: rgba(239,68,68,0.1);  color: var(--danger);  border: 1px solid rgba(239,68,68,0.2); }
  .badge-trial     { background: rgba(245,158,11,0.1); color: var(--warning); border: 1px solid rgba(245,158,11,0.2); }

  .plan-badge {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .code-text {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    background: rgba(249,115,22,0.08);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .action-btns { display: flex; gap: 8px; }

  .btn-sm {
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 11px;
    font-family: var(--mono);
    cursor: pointer;
    border: 1px solid;
    transition: all 0.15s;
    font-weight: 500;
  }

  .btn-suspend  { color: var(--danger);  border-color: rgba(239,68,68,0.3);  background: transparent; }
  .btn-activate { color: var(--success); border-color: rgba(34,197,94,0.3);  background: transparent; }
  .btn-suspend:hover  { background: rgba(239,68,68,0.1); }
  .btn-activate:hover { background: rgba(34,197,94,0.1); }

  /* ── Modal ────────────────────────────── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 480px;
    max-width: 95vw;
    padding: 32px;
    position: relative;
    transform: translateY(20px);
    transition: transform 0.2s;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    border-radius: 16px 16px 0 0;
  }

  .modal-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 24px;
  }

  .modal-close {
    position: absolute;
    top: 16px; right: 20px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    transition: color 0.2s;
  }

  .modal-close:hover { color: var(--text); }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid .full { grid-column: 1 / -1; }

  .success-toast {
    position: fixed;
    bottom: 32px; right: 32px;
    background: rgba(34,197,94,0.15);
    border: 1px solid rgba(34,197,94,0.3);
    color: var(--success);
    padding: 14px 20px;
    border-radius: 10px;
    font-family: var(--mono);
    font-size: 13px;
    z-index: 300;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s;
  }

  .success-toast.show { transform: translateY(0); opacity: 1; }

  .loading { color: var(--muted); font-family: var(--mono); font-size: 13px; padding: 40px; text-align: center; }

  @media (max-width: 768px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .main { padding: 16px; }
    .form-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ── Login ── -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">MEP Platform</div>
    <div class="login-title">Admin Console</div>
    <div class="login-sub">SUPER_ADMIN access only</div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="superadmin" autocomplete="username">
    </div>
    <div class="field">
      <label>PIN</label>
      <input type="password" id="pin" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" onclick="login()">Sign In</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- ── Dashboard ── -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-brand">MEP // Admin Console</div>
    <div class="topbar-right">
      <div class="topbar-user" id="topbar-user"></div>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="main">
    <!-- Stats -->
    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="stat-label">Total Companies</div><div class="stat-value orange" id="s-total">—</div></div>
      <div class="stat-card"><div class="stat-label">Active</div><div class="stat-value" id="s-active">—</div></div>
      <div class="stat-card"><div class="stat-label">Total Employees</div><div class="stat-value" id="s-employees">—</div></div>
      <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-value" id="s-users">—</div></div>
    </div>

    <!-- Companies -->
    <div class="section-header">
      <div class="section-title">Companies</div>
      <button class="btn-add" onclick="openModal()">＋ Add Company</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Company</th>
            <th>Code</th>
            <th>Plan</th>
            <th>Status</th>
            <th>Employees</th>
            <th>Created</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="companies-tbody">
          <tr><td colspan="7" class="loading">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ── Add Company Modal ── -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div class="modal-title">Add New Company</div>
    <div class="form-grid">
      <div class="field full">
        <label>Company Name</label>
        <input type="text" id="f-name" placeholder="Gulf Plumbing Co">
      </div>
      <div class="field">
        <label>Admin Username</label>
        <input type="text" id="f-username" placeholder="gulf_admin">
      </div>
      <div class="field">
        <label>Admin PIN (4–8 chars)</label>
        <input type="password" id="f-pin" placeholder="••••">
      </div>
      <div class="field">
        <label>Plan</label>
        <select id="f-plan" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:14px;font-family:var(--mono);color:var(--text);outline:none;">
          <option value="BASIC">Basic</option>
          <option value="PRO">Pro</option>
          <option value="ENTERPRISE">Enterprise</option>
        </select>
      </div>
      <div class="field">
        <label>Admin Email (optional)</label>
        <input type="email" id="f-email" placeholder="admin@company.com">
      </div>
      <div class="field">
        <label>Phone (optional)</label>
        <input type="text" id="f-phone" placeholder="+1 234 567 8900">
      </div>
    </div>
    <div class="error-msg" id="modal-error"></div>
    <button class="btn-primary" onclick="createCompany()" style="margin-top:20px;">Create Company</button>
  </div>
</div>

<!-- ── Toast ── -->
<div class="success-toast" id="toast"></div>

<script>
  let token = localStorage.getItem('sa_token') || null;

  // ── Auto-login if token exists ──
  if (token) showDashboard();

  document.getElementById('pin').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  async function api(method, path, body) {
    const res = await fetch('/api' + path, {
      method,
      headers: {
        'Content-Type': 'application/json',
        ...(token ? { 'Authorization': 'Bearer ' + token } : {})
      },
      body: body ? JSON.stringify(body) : undefined
    });
    return res.json();
  }

  async function login() {
    const username = document.getElementById('username').value.trim();
    const pin      = document.getElementById('pin').value;
    const errEl    = document.getElementById('login-error');

    if (!username || !pin) {
      showError(errEl, 'Username and PIN are required');
      return;
    }

    const data = await api('POST', '/auth/login', { username, pin });

    if (!data.ok) {
      const msgs = {
        INVALID_CREDENTIALS: 'Invalid username or PIN',
        USER_DISABLED:       'Account is disabled',
        COMPANY_SUSPENDED:   'Company account is suspended',
        INVALID_PIN_FORMAT:  'Invalid PIN format',
      };
      showError(errEl, msgs[data.error] || data.error);
      return;
    }

    if (data.user.role !== 'SUPER_ADMIN') {
      showError(errEl, 'Access denied — SUPER_ADMIN only');
      return;
    }

    token = data.token;
    localStorage.setItem('sa_token', token);
    showDashboard();
  }

  function logout() {
    token = null;
    localStorage.removeItem('sa_token');
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  }

  async function showDashboard() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('dashboard').style.display    = 'block';

    // verify token still valid
    const whoami = await api('GET', '/auth/whoami');
    if (!whoami.ok || whoami.user?.role !== 'SUPER_ADMIN') {
      logout(); return;
    }

    document.getElementById('topbar-user').textContent = whoami.user.username;

    loadStats();
    loadCompanies();
  }

  async function loadStats() {
    const data = await api('GET', '/super/stats');
    if (!data.ok) return;
    const s = data.stats;
    document.getElementById('s-total').textContent     = s.total_companies;
    document.getElementById('s-active').textContent    = s.active_companies;
    document.getElementById('s-employees').textContent = s.total_employees;
    document.getElementById('s-users').textContent     = s.total_users;
  }

  async function loadCompanies() {
    const data = await api('GET', '/super/companies');
    const tbody = document.getElementById('companies-tbody');

    if (!data.ok) {
      tbody.innerHTML = `<tr><td colspan="7" class="loading">Failed to load companies</td></tr>`;
      return;
    }

    if (!data.companies.length) {
      tbody.innerHTML = `<tr><td colspan="7" class="loading">No companies yet</td></tr>`;
      return;
    }

    tbody.innerHTML = data.companies.map(c => `
      <tr>
        <td><strong>${esc(c.name)}</strong><br><small style="color:var(--muted);font-family:var(--mono);font-size:11px;">${esc(c.admin_email || '')}</small></td>
        <td><span class="code-text">${esc(c.company_code)}</span></td>
        <td><span class="plan-badge">${esc(c.plan)}</span></td>
        <td><span class="badge badge-${(c.status||'').toLowerCase()}">${esc(c.status)}</span></td>
        <td style="font-family:var(--mono)">${c.employee_count || 0}</td>
        <td style="font-family:var(--mono);font-size:12px;color:var(--muted)">${formatDate(c.created_at)}</td>
        <td>
          <div class="action-btns">
            ${c.status === 'ACTIVE'
              ? `<button class="btn-sm btn-suspend"  onclick="suspend(${c.id})">Suspend</button>`
              : `<button class="btn-sm btn-activate" onclick="activate(${c.id})">Activate</button>`
            }
          </div>
        </td>
      </tr>
    `).join('');
  }

  async function suspend(id) {
    if (!confirm('Suspend this company? Their users will not be able to log in.')) return;
    const data = await api('POST', `/super/companies/${id}/suspend`);
    if (data.ok) { toast('Company suspended'); loadCompanies(); loadStats(); }
  }

  async function activate(id) {
    const data = await api('POST', `/super/companies/${id}/activate`);
    if (data.ok) { toast('Company activated'); loadCompanies(); loadStats(); }
  }

  function openModal() {
    document.getElementById('modal').classList.add('open');
    document.getElementById('f-name').focus();
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.getElementById('modal-error').style.display = 'none';
    ['f-name','f-username','f-pin','f-email','f-phone'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('f-plan').value = 'BASIC';
  }

  async function createCompany() {
    const errEl = document.getElementById('modal-error');
    const body  = {
      name:           document.getElementById('f-name').value.trim(),
      admin_username: document.getElementById('f-username').value.trim(),
      admin_pin:      document.getElementById('f-pin').value,
      plan:           document.getElementById('f-plan').value,
      admin_email:    document.getElementById('f-email').value.trim() || undefined,
      phone:          document.getElementById('f-phone').value.trim() || undefined,
    };

    if (!body.name)           { showError(errEl, 'Company name is required'); return; }
    if (!body.admin_username) { showError(errEl, 'Admin username is required'); return; }
    if (!body.admin_pin)      { showError(errEl, 'Admin PIN is required'); return; }

    const data = await api('POST', '/super/companies', body);

    if (!data.ok) {
      const msgs = {
        COMPANY_NAME_REQUIRED: 'Company name is required',
        ADMIN_USERNAME_REQUIRED: 'Admin username is required',
        ADMIN_PIN_REQUIRED: 'Admin PIN is required',
        INVALID_PIN_FORMAT: 'PIN must be 4-8 characters',
        USERNAME_TAKEN: 'Username is already taken',
        INVALID_PLAN: 'Invalid plan selected',
      };
      showError(errEl, msgs[data.error] || data.error);
      return;
    }

    closeModal();
    toast(`Company "${data.company.name}" created — Code: ${data.company.company_code}`);
    loadCompanies();
    loadStats();
  }

  // ── Helpers ──
  function showError(el, msg) {
    el.textContent = msg;
    el.style.display = 'block';
  }

  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3500);
  }

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  // Close modal on overlay click
  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
</script>
</body>
</html>
