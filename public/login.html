<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEP Platform — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #060610;
    --surface: #0e0e1a;
    --border:  #1a1a2e;
    --accent:  #6366f1;
    --accent2: #818cf8;
    --text:    #e2e8f0;
    --muted:   #64748b;
    --success: #22c55e;
    --danger:  #ef4444;
    --mono:    'DM Mono', monospace;
    --sans:    'Plus Jakarta Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed;
    top: -30%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    position: relative;
    z-index: 1;
    width: 420px;
    max-width: 95vw;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 44px 40px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 20px;
    padding: 1px;
    background: linear-gradient(135deg, rgba(99,102,241,0.3), transparent 50%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  /* ── Screens ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── Logo ── */
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 16px;
    color: #fff;
    flex-shrink: 0;
  }

  .logo-text {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
  }

  h2 {
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 6px;
    line-height: 1.2;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
    font-family: var(--mono);
  }

  /* ── Form fields ── */
  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 14px;
    font-family: var(--mono);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
  }

  .field input::placeholder { color: #2d2d4a; }

  .btn {
    width: 100%;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-family: var(--sans);
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }

  .btn-primary:hover  { background: var(--accent2); }
  .btn-primary:active { transform: scale(0.98); }

  /* ── Error / info ── */
  .alert {
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    font-family: var(--mono);
    margin-top: 14px;
    display: none;
  }

  .alert-error {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.25);
    color: var(--danger);
  }

  .alert-info {
    background: rgba(99,102,241,0.08);
    border: 1px solid rgba(99,102,241,0.25);
    color: var(--accent2);
    display: block;
  }

  /* ── Change PIN screen ── */
  .pin-warning {
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.25);
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 13px;
    color: #fbbf24;
    margin-bottom: 24px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .pin-warning-icon { font-size: 16px; flex-shrink: 0; }

  .pin-rules {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--muted);
    margin-top: 6px;
  }

  /* ── Loading spinner ── */
  .btn.loading {
    opacity: 0.7;
    pointer-events: none;
  }

  .btn.loading::after {
    content: ' ●●●';
    animation: dots 1s infinite;
  }

  @keyframes dots {
    0%   { content: ' ●○○'; }
    33%  { content: ' ●●○'; }
    66%  { content: ' ●●●'; }
    100% { content: ' ○○○'; }
  }
</style>
</head>
<body>
<div class="card">

  <!-- ── Screen 1: Login ── -->
  <div class="screen active" id="screen-login">
    <div class="logo">
      <div class="logo-mark">M</div>
      <div>
        <div class="logo-text">MEP Platform</div>
        <div class="logo-sub">Workforce Management</div>
      </div>
    </div>

    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to your company account</p>

    <div class="field">
      <label>Username</label>
      <input type="text" id="login-username" placeholder="your_username" autocomplete="username">
    </div>
    <div class="field">
      <label>PIN</label>
      <input type="password" id="login-pin" placeholder="••••" autocomplete="current-password">
    </div>

    <button class="btn btn-primary" id="btn-login" onclick="doLogin()">Sign In</button>
    <div class="alert alert-error" id="login-error"></div>
  </div>

  <!-- ── Screen 2: Change PIN ── -->
  <div class="screen" id="screen-change-pin">
    <div class="logo">
      <div class="logo-mark">M</div>
      <div>
        <div class="logo-text">MEP Platform</div>
        <div class="logo-sub">Security Setup</div>
      </div>
    </div>

    <h2>Set your PIN</h2>
    <p class="subtitle">Required before you can continue</p>

    <div class="pin-warning">
      <span class="pin-warning-icon">⚠️</span>
      <div>
        Your account was created with a temporary PIN. You must set a new personal PIN to continue.
        <div class="pin-rules">4–8 characters. Do not share with anyone.</div>
      </div>
    </div>

    <div class="field">
      <label>Current (Temporary) PIN</label>
      <input type="password" id="cp-current" placeholder="Enter temporary PIN">
    </div>
    <div class="field">
      <label>New PIN</label>
      <input type="password" id="cp-new" placeholder="Choose a new PIN">
    </div>
    <div class="field">
      <label>Confirm New PIN</label>
      <input type="password" id="cp-confirm" placeholder="Repeat new PIN">
    </div>

    <button class="btn btn-primary" id="btn-change" onclick="doChangePin()">Set New PIN & Continue</button>
    <div class="alert alert-error" id="change-error"></div>
  </div>

</div>

<script>
  let _token         = null;
  let _mustChangePIN = false;

  // ── Enter key support ──
  document.getElementById('login-pin').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('cp-confirm').addEventListener('keydown', e => {
    if (e.key === 'Enter') doChangePin();
  });

  async function doLogin() {
    const username = document.getElementById('login-username').value.trim();
    const pin      = document.getElementById('login-pin').value;
    const errEl    = document.getElementById('login-error');
    const btn      = document.getElementById('btn-login');

    errEl.style.display = 'none';

    if (!username || !pin) { showError(errEl, 'Username and PIN are required'); return; }

    btn.classList.add('loading');
    btn.textContent = 'Signing in';

    try {
      const res  = await fetch('/api/auth/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ username, pin }),
      });
      const data = await res.json();

      if (!data.ok) {
        const msgs = {
          INVALID_CREDENTIALS: 'Invalid username or PIN',
          USER_DISABLED:       'Your account has been disabled',
          COMPANY_SUSPENDED:   'Your company account is suspended — contact support',
          INVALID_PIN_FORMAT:  'Invalid PIN format',
        };
        showError(errEl, msgs[data.error] || data.error);
        return;
      }

      // Block SUPER_ADMIN from using this login page
      if (data.user.role === 'SUPER_ADMIN') {
        showError(errEl, 'Access denied — use the Admin Console');
        return;
      }

      _token         = data.token;
      _mustChangePIN = data.must_change_pin === true;

      if (_mustChangePIN) {
        showScreen('screen-change-pin');
      } else {
        goToDashboard();
      }

    } catch (err) {
      showError(errEl, 'Connection error — please try again');
    } finally {
      btn.classList.remove('loading');
      btn.textContent = 'Sign In';
    }
  }

  async function doChangePin() {
    const current = document.getElementById('cp-current').value;
    const newPin  = document.getElementById('cp-new').value;
    const confirm = document.getElementById('cp-confirm').value;
    const errEl   = document.getElementById('change-error');
    const btn     = document.getElementById('btn-change');

    errEl.style.display = 'none';

    if (!current || !newPin || !confirm) { showError(errEl, 'All fields are required'); return; }
    if (newPin !== confirm)              { showError(errEl, 'PINs do not match'); return; }
    if (newPin.length < 4 || newPin.length > 8) {
      showError(errEl, 'PIN must be 4–8 characters'); return;
    }
    if (current === newPin) {
      showError(errEl, 'New PIN must be different from current PIN'); return;
    }

    btn.classList.add('loading');
    btn.textContent = 'Saving';

    try {
      const res  = await fetch('/api/auth/change-pin', {
        method:  'POST',
        headers: {
          'Content-Type':  'application/json',
          'Authorization': 'Bearer ' + _token,
        },
        body: JSON.stringify({ current_pin: current, new_pin: newPin }),
      });
      const data = await res.json();

      if (!data.ok) {
        const msgs = {
          WRONG_CURRENT_PIN:  'Current PIN is incorrect',
          SAME_PIN:           'New PIN must be different from current PIN',
          INVALID_PIN_FORMAT: 'PIN must be 4–8 characters',
        };
        showError(errEl, msgs[data.error] || data.error);
        return;
      }

      // Re-login to get fresh token without must_change_pin
      const username = document.getElementById('login-username').value.trim();
      const reLogin  = await fetch('/api/auth/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ username, pin: newPin }),
      });
      const reData = await reLogin.json();
      if (reData.ok) _token = reData.token;

      goToDashboard();

    } catch (err) {
      showError(errEl, 'Connection error — please try again');
    } finally {
      btn.classList.remove('loading');
      btn.textContent = 'Set New PIN & Continue';
    }
  }

  function goToDashboard() {
    localStorage.setItem('mep_token', _token);
    window.location.href = '/app.html';
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function showError(el, msg) {
    el.textContent     = msg;
    el.style.display   = 'block';
  }
</script>
</body>
</html>
