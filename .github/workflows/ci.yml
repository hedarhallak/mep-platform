name: CI

# Section 18 — Engineering Quality Program, Week 1 Day 1.
# Minimal CI: install + project-specific audit + npm audit (informational).
# ESLint / Knip / Semgrep / tests will be layered on later days.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs of the same ref when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Skip Chromium download — puppeteer is only used at runtime on the server.
  PUPPETEER_SKIP_DOWNLOAD: 'true'
  # Don't run native bcrypt build steps if a prebuilt binary is available.
  NODE_ENV: development

jobs:
  backend:
    name: Backend (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20']
    # ─── Phase 11c — PostGIS service container for DB-backed tests ───
    # Tests that hit DB-touching routes connect via the DATABASE_URL env
    # var below. Tests that don't need DB (smoke, pure helpers, /api/health)
    # ignore it; the lazy pg.Pool in db.js never opens a connection unless
    # a query runs.
    services:
      postgres:
        image: postgis/postgis:14-3.4
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # tests/setup.js promotes TEST_DATABASE_URL to DATABASE_URL for the
      # test process, so the app's pg.Pool connects to the service container
      # above. Locally without TEST_DATABASE_URL, tests fall through to a
      # sentinel and DB-backed tests skip — protects Hedar's dev DB from
      # accidental writes.
      TEST_DATABASE_URL: postgres://postgres:testpass@localhost:5432/testdb?sslmode=disable
      JWT_SECRET: ci-test-secret-do-not-deploy-this-value-32-chars
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Pre-create roles + apply baseline schema (for DB-backed tests)
        env:
          PGPASSWORD: testpass
        run: |
          psql -h localhost -U postgres -d testdb -c "CREATE ROLE mepuser WITH LOGIN PASSWORD 'testpass';"
          psql -h localhost -U postgres -d testdb -v ON_ERROR_STOP=1 -f migrations/000_baseline_2026-04-28.sql

      - name: Route audit (check-routes.js)
        run: npm run audit:routes

      - name: Lint (blocking — Day 2 Phase 2 onward)
        run: npm run lint

      - name: Format check (blocking — Day 2 Phase 2 onward)
        run: npm run format:check

      - name: Tests (Jest, blocking — Phase 10 onward)
        # All test categories run against the PostGIS service container above.
        # Tests that don't need DB (smoke, pure helpers) ignore DATABASE_URL.
        run: npm test

      - name: Knip — dead code detection (informational, CI only — Day 2 Phase 3)
        # NOTE: knip 5.x uses fast-glob + oxc-resolver which crash with null
        # bytes on Hedar's Windows setup. CI runs on fresh Ubuntu — works.
        # `npm run knip` is intentionally not expected to work locally on Windows.
        run: npm run knip
        continue-on-error: true

      - name: Security audit (informational)
        run: npm audit --audit-level=high
        continue-on-error: true

  frontend:
    name: Frontend (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20']
    defaults:
      run:
        working-directory: mep-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: mep-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (informational)
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Security audit (informational)
        run: npm audit --audit-level=high
        continue-on-error: true

  mobile:
    name: Mobile (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20']
    defaults:
      run:
        working-directory: mep-mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: mep-mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check (informational)
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Security audit (informational)
        run: npm audit --audit-level=high
        continue-on-error: true

  # ─── Day 3 — Semgrep static security analysis (informational) ─────────
  # Scans the codebase for known vulnerability patterns: SQL injection,
  # XSS, missing auth, hardcoded secrets, prototype pollution, OWASP top
  # 10. Findings appear in step output and (when configured) in GitHub's
  # Security tab. Informational first — flip to blocking after triage.
  security:
    name: Security (Semgrep)
    runs-on: ubuntu-latest
    # Semgrep image already has Python + semgrep CLI installed.
    container:
      image: semgrep/semgrep
    # Skip on Dependabot PRs to save CI minutes — they don't change code logic.
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Semgrep scan (blocking — Day 3 Phase 8.6 onward)
        # Baseline triaged in Phase 8.5; CI #38 confirmed 0 findings.
        # Any new security issue introduced by a PR will now fail this job.
        run: |
          semgrep scan \
            --config "p/javascript" \
            --config "p/nodejs" \
            --config "p/expressjs" \
            --config "p/owasp-top-ten" \
            --config "p/secrets" \
            --exclude "mep-frontend/" \
            --exclude "mep-mobile/" \
            --exclude "node_modules/" \
            --exclude "public/" \
            --exclude "dist/" \
            --exclude "uploads/" \
            --exclude "data/" \
            --exclude "constrai-landing/" \
            --error \
            --metrics=off

  # ─── Day 4-5 — Atlas schema validation (informational first) ──────────
  # Spins up a fresh PostGIS Postgres, applies all migrations on top of the
  # baseline, and verifies the schema converges without errors. Catches:
  #  - Broken SQL syntax in new migration files
  #  - Migrations that depend on prior state not present in the baseline
  #  - Conflicting/duplicate migrations
  # Drift detection (comparing applied schema vs prod) is added in Phase 9.5.
  schema:
    name: Schema (Atlas)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:14-3.4
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: drifttest
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Atlas
        uses: ariga/setup-atlas@v0

      - name: Pre-create roles referenced by the baseline dump
        env:
          PGPASSWORD: testpass
        run: |
          # The pg_dump from prod includes ALTER TABLE ... OWNER TO mepuser
          # statements. Without the role, psql errors out. Create it as a
          # no-privileges placeholder for the duration of the CI run.
          psql -h localhost -U postgres -d drifttest -c "CREATE ROLE mepuser WITH LOGIN PASSWORD 'testpass';"

      - name: Apply baseline + migrations to fresh Postgres
        env:
          PGPASSWORD: testpass
        run: |
          # Baseline first: a pg_dump of prod schema. Apply via psql because
          # it contains CREATE EXTENSION + a 5000+ line schema, simpler than
          # piping through atlas for the first apply.
          psql -h localhost -U postgres -d drifttest -v ON_ERROR_STOP=1 -f migrations/000_baseline_2026-04-28.sql

          # Verify: the schema should now have core tables (sanity check).
          psql -h localhost -U postgres -d drifttest -c "\dt" | head -20

      - name: Atlas migrate lint (informational)
        env:
          DEV_URL: postgres://postgres:testpass@localhost:5432/drifttest?sslmode=disable
        run: |
          # Lint future migrations on top of the baseline. With only 000 in
          # place this is mostly a no-op, but it kicks in once new migration
          # files land. --latest 1 lints the most recent migration only.
          atlas migrate lint \
            --dir "file://migrations" \
            --dev-url "$DEV_URL" \
            --latest 1 || echo "(lint informational — no fail)"
        continue-on-error: true
