# Dependabot — Section 18 Week 1 Day 1.
# Weekly updates, minor/patch grouped per ecosystem.
#
# Policy on major version bumps (Section 19 Phase 3, April 27, 2026):
#   ALL semver-major bumps are IGNORED for normal version-update PRs.
#   Major upgrades require coordinated manual review (changelog, breaking
#   changes, migration steps) and don't belong in an automated weekly PR.
#   Security-driven major bumps still come through automatically because
#   Dependabot bypasses ignore rules for security advisories.
#
# 4 ecosystems: backend root, mep-frontend, mep-mobile, GitHub Actions.

version: 2
updates:
  # ---------------- Backend (Express + Postgres) ----------------
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
      timezone: America/Toronto
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: 'chore(deps)'
      include: scope
    groups:
      backend-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  # ---------------- Frontend (React + Vite) ----------------
  - package-ecosystem: npm
    directory: /mep-frontend
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
      timezone: America/Toronto
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: 'chore(deps-frontend)'
      include: scope
    groups:
      frontend-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major

  # ---------------- Mobile (Expo + React Native) ----------------
  # Expo SDK upgrades require manual coordination with native build, EAS,
  # and the entire expo-* package family. NEVER auto-bump anything mobile
  # at the major level.
  - package-ecosystem: npm
    directory: /mep-mobile
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
      timezone: America/Toronto
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - mobile
    commit-message:
      prefix: 'chore(deps-mobile)'
      include: scope
    groups:
      mobile-minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
      # Expo SDK pins react-native + the RN-ecosystem packages. Their 0.x
      # versioning means a breaking RN jump (e.g. 0.81 -> 0.86) looks like a
      # "minor" to Dependabot and slips past the semver-major ignore, but it
      # breaks jest-expo / the native build. These move ONLY via `expo upgrade`
      # to a new SDK — never piecemeal. (PR #454 closed for exactly this.)
      - dependency-name: 'expo'
      - dependency-name: 'expo-*'
      - dependency-name: 'jest-expo'
      - dependency-name: 'babel-preset-expo'
      - dependency-name: 'react-native'
      - dependency-name: 'react-native-*'
      - dependency-name: '@react-native/*'
      - dependency-name: '@react-native-community/*'

  # ---------------- GitHub Actions ----------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '08:00'
      timezone: America/Toronto
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: 'chore(deps-actions)'
      include: scope
    groups:
      github-actions-all:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
