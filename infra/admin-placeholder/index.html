<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Constrai Admin</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        background: #0f172a;
        color: #e2e8f0;
      }
      .card {
        text-align: center;
        padding: 3rem;
      }
      h1 {
        font-size: 2.5rem;
        margin: 0 0 1rem;
      }
      p {
        font-size: 1.1rem;
        color: #94a3b8;
        margin: 0;
      }
      .badge {
        display: inline-block;
        margin-top: 1.5rem;
        padding: 0.4rem 1rem;
        background: #1e293b;
        border: 1px solid #334155;
        border-radius: 999px;
        font-size: 0.85rem;
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Constrai Admin</h1>
      <p>Internal portal — under construction.</p>
      <div class="badge">Phase 5 / 90-A • Infrastructure ready</div>
    </div>
  </body>
</html>
