# admin.constrai.ca — Phase 5 SUPER_ADMIN portal
#
# Lives on the prod Droplet at:
#   /etc/nginx/sites-available/admin-constrai
#   (symlinked from /etc/nginx/sites-enabled/admin-constrai)
#
# Phase 90-A: subdomain stood up with a static placeholder page.
# Phase 90-B (this revision): /api/* proxies to the Node backend on
#   localhost:3000. The Express app uses Host-header dispatch (see
#   app.js's vhost() middleware) so requests arriving with
#   Host: admin.constrai.ca land on the admin sub-app, which only
#   mounts /api/super and /api/super/ccq-rates plus the public routes.
#   Tenant routes return 404 NOT_FOUND on this Host (anti-leak guard).
# Phase 90-C will replace the static placeholder with the real Vite
#   admin build output.

server {
    server_name admin.constrai.ca;

    # Backend API proxy. Force the Host header to the literal portal name
    # so the Node vhost dispatcher always sees admin.constrai.ca regardless
    # of whatever Host the upstream client sent (lint-friendly: avoids
    # passing through any attacker-controlled value).
    #
    # The Constrai backend speaks plain REST over HTTP/1.1 — no WebSockets,
    # no h2c. We deliberately do NOT forward Upgrade/Connection headers from
    # the client, otherwise an attacker could request an HTTP/2-cleartext
    # upgrade that tunnels traffic past Nginx's access controls (h2c
    # smuggling). If WebSocket support is ever needed here, restrict to
    # an explicit allowlist (e.g., only forward when Upgrade=='websocket').
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host admin.constrai.ca;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Placeholder static page until 90-C lands.
    root /var/www/admin-placeholder;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl;
    include /etc/nginx/snippets/cloudflare-ssl.conf;
}

server {
    listen 80;
    server_name admin.constrai.ca;
    # Literal redirect target — avoids using attacker-controlled Host header
    # variables. Since server_name is a single host, certbot's default if-guard
    # pattern is redundant: matching this server block already proves the Host
    # header equals admin.constrai.ca.
    return 301 https://admin.constrai.ca$request_uri;
}
