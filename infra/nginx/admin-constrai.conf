# admin.constrai.ca — Phase 5 SUPER_ADMIN portal
#
# Lives on the prod Droplet at:
#   /etc/nginx/sites-available/admin-constrai
#   (symlinked from /etc/nginx/sites-enabled/admin-constrai)
#
# Phase 90-A: subdomain stood up with a static placeholder page.
# Phase 90-B: /api/* proxies to localhost:3000 (Express vhost dispatch).
# Phase 90-C (this revision): root switched from /var/www/admin-placeholder
#   to /var/www/mep/mep-frontend/dist (the multi-entry Vite build), and
#   try_files fallback switched from /index.html to /admin.html so SPA
#   client-side routes resolve to the admin React shell.
#
# The placeholder folder /var/www/admin-placeholder is now unused. Kept
# on disk for one cycle as a rollback target; safe to delete after 90-D.

server {
    server_name admin.constrai.ca;

    # Backend API proxy. Force the Host header to the literal portal name
    # so the Node vhost dispatcher always sees admin.constrai.ca.
    #
    # The Constrai backend speaks plain REST over HTTP/1.1 — no WebSockets,
    # no h2c. We deliberately do NOT forward Upgrade/Connection headers
    # from the client (h2c smuggling protection).
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host admin.constrai.ca;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Admin SPA — Vite multi-entry build output (90-C).
    # `try_files … /admin.html` (NOT /index.html) so client-side routes
    # under the admin React tree resolve correctly. /index.html is the
    # tenant entry and serving it here would render the wrong app.
    root /var/www/mep/mep-frontend/dist;
    index admin.html;
    location / {
        try_files $uri $uri/ /admin.html;
    }

    listen 443 ssl;
    include /etc/nginx/snippets/cloudflare-ssl.conf;
}

server {
    listen 80;
    server_name admin.constrai.ca;
    # Literal redirect target — avoids using attacker-controlled Host header
    # variables. Since server_name is a single host, certbot's default if-guard
    # pattern is redundant: matching this server block already proves the Host
    # header equals admin.constrai.ca.
    return 301 https://admin.constrai.ca$request_uri;
}
