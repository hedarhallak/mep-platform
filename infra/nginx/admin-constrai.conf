# admin.constrai.ca — Phase 5 SUPER_ADMIN portal
#
# Lives on the prod Droplet at:
#   /etc/nginx/sites-available/admin-constrai
#   (symlinked from /etc/nginx/sites-enabled/admin-constrai)
#
# Phase 90-A: placeholder only — serves a static "coming soon" page from
# /var/www/admin-placeholder. See ../admin-placeholder/index.html for the
# canonical copy of that placeholder content.
#
# 90-B will add a `location /api/` block here that proxies to the admin sub-app
# in the Express vhost split (port 3000, but routed via Host header by index.js).
# 90-C will switch `root` from /var/www/admin-placeholder to the admin Vite
# build output (e.g., /var/www/mep/mep-frontend/dist-admin or similar — exact
# path TBD when 90-C designs the multi-entry layout).
#
# Deployed: May 9, 2026 (verified via curl + browser at the same time).

server {
    server_name admin.constrai.ca;

    # Placeholder static page until 90-C lands.
    root /var/www/admin-placeholder;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl;
    include /etc/nginx/snippets/cloudflare-ssl.conf;
}

server {
    if ($host = admin.constrai.ca) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name admin.constrai.ca;
    return 404;
}
