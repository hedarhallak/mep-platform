# *.constrai.ca — Phase 6-D wildcard tenant vhost
#
# Lives on the prod Droplet at:
#   /etc/nginx/sites-available/wildcard-constrai
#   (symlinked from /etc/nginx/sites-enabled/wildcard-constrai)
#
# Section 102 (May 14, 2026) — operational follow-up that unblocks
# Phase 6-D end-to-end. Without this server block, a request to
# `acm.constrai.ca` resolves at Cloudflare (the `*.constrai.ca` DNS
# wildcard is in place from Phase 1) but lands on nginx's default
# server, which serves the tenant build via the explicit
# `app.constrai.ca` block only by accident (or returns the wrong content
# entirely). This block catches every `<code>.constrai.ca` that doesn't
# have an explicit server_name match and serves the tenant Vite build
# (the same one app.constrai.ca serves) so Phase 6-C's branding
# bootstrap can read the subdomain from window.location.hostname and
# theme the page.
#
# nginx server_name matching priority guarantees this only fires when
# nothing more specific matches:
#   1. exact name (app.constrai.ca, admin.constrai.ca, 143.110.218.84,
#      www.constrai.ca if served from this Droplet)
#   2. leading wildcard `*.constrai.ca` — this block
#   3. regex
#
# So `app.constrai.ca` traffic still hits the explicit block in
# infra/nginx/constrai.conf, and `admin.constrai.ca` still hits
# admin-constrai.conf. Only the new tenant subdomains (acm, xyz, ...)
# fall through to this block.
#
# Backend Host header policy: this block passes the request host (the
# literal tenant subdomain) to the upstream. The Node vhost dispatcher
# in app.js (Section 90-B) special-cases `admin.constrai.ca` and
# `app.constrai.ca`; any other host falls through to the default
# tenantApp. That's exactly what we want — tenant subdomains use the
# tenant route tree and the backend sees the real hostname so the
# redirect_url logic (Section 100.5) correctly returns null for direct
# tenant entry (no looping redirect when the user is already on the
# right URL).
#
# Semgrep's generic.nginx.security.request-host-used rule flags the
# request-host variable as attacker-controlled. In this block it is
# pre-validated: nginx's server_name matching (`*.constrai.ca`) is
# itself an allowlist — only requests with a Host matching the wildcard
# reach this block, so the request host is constrained to that pattern
# before any directive evaluates it. The specific lines using the
# request host carry inline `nosemgrep` annotations.
#
# SSL prerequisite: the Cloudflare Origin Certificate at
# /etc/nginx/ssl/cloudflare-origin.pem MUST include `*.constrai.ca`
# in its Subject Alternative Name list. Section 91's cert was issued
# for `constrai.ca` + `*.constrai.ca` (Cloudflare's default wildcard
# bundle). Verify before reload:
#   openssl x509 -in /etc/nginx/ssl/cloudflare-origin.pem -text -noout \
#     | grep -A2 "Subject Alternative Name"
# Expected: `DNS:constrai.ca, DNS:*.constrai.ca`.
# If the wildcard is missing, reissue at Cloudflare → SSL/TLS → Origin
# Server → Create Certificate (default form already requests the wildcard).

server {
    server_name *.constrai.ca;
    client_max_body_size 20M;

    # Frontend static files — same tenant Vite build as app.constrai.ca.
    # The build's index.html runs Section 99's branding bootstrap, which
    # extracts the company code from window.location.hostname and calls
    # GET /api/companies/<code>/branding before React mounts.
    root /var/www/mep/mep-frontend/dist;
    index index.html;

    # Backend API proxy. Pass the request host so the backend's vhost
    # dispatcher sees the actual tenant subdomain — the redirect_url
    # rule in routes/auth.js#login only fires when Host ==
    # app.constrai.ca, so a direct tenant-subdomain login correctly
    # returns redirect_url=null (no self-loop). We deliberately do NOT
    # forward Upgrade/Connection headers (h2c smuggling protection —
    # same policy as the explicit vhosts).
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        # nosemgrep: generic.nginx.security.request-host-used.request-host-used
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # User-uploaded files (Hub photos, profile avatars, etc).
    location /uploads/ {
        alias /var/www/mep/uploads/;
    }

    # Anti-leak: admin.html is the admin Vite entry; only ever served
    # from admin.constrai.ca. Match the same guard in constrai.conf
    # so a curious client hitting acm.constrai.ca/admin.html doesn't
    # render the admin shell on a tenant subdomain.
    location = /admin.html {
        return 404;
    }

    # Frontend SPA fallback — Vite multi-entry tenant entry HTML.
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl;
    include /etc/nginx/snippets/cloudflare-ssl.conf;
}

server {
    listen 80;
    server_name *.constrai.ca;
    # Redirect HTTP to HTTPS, preserving the requested host so each
    # tenant ends up on https://<their-subdomain>.constrai.ca. Unlike
    # the explicit blocks which redirect to a literal target, this one
    # MUST use the request host because the wildcard catches an
    # unbounded set of names. The host has already been validated
    # against the `*.constrai.ca` server_name allowlist by nginx before
    # this block was selected — see the long comment in the 443 block
    # above for the full safety argument.
    # nosemgrep: generic.nginx.security.request-host-used.request-host-used
    return 301 https://$host$request_uri;
}
