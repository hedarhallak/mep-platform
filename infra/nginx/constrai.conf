# app.constrai.ca — Phase 5 tenant portal Nginx config
#
# Lives on the prod Droplet at:
#   /etc/nginx/sites-available/constrai
#   (symlinked from /etc/nginx/sites-enabled/constrai)
#
# History:
#   - Pre-Phase-5: original certbot-emitted config, untracked in repo.
#   - 90-A introduced the `infra/` convention but only the admin server
#     block was mirrored at that point.
#   - 90-D (this revision) mirrors the tenant block here for traceability
#     and applies three security improvements that the original certbot
#     config didn't have:
#
#     1. Drop forwarded Upgrade/Connection headers — h2c smuggling
#        protection, same fix that 90-B applied to admin-constrai.conf.
#        The Constrai backend speaks plain REST over HTTP/1.1; no
#        WebSocket support means there's no reason to forward upgrade
#        requests to the upstream.
#
#     2. proxy_set_header Host uses the literal portal name instead of
#        the value from the upstream Host header. Defense-in-depth:
#        Express's vhost() dispatcher (app.js) routes by Host so this
#        guarantees app.constrai.ca traffic always reaches the tenant
#        sub-app even if a malicious client tampered with the header.
#
#     3. The HTTP→HTTPS redirect block uses a literal redirect target
#        instead of the certbot-default `if ($host = ...) { return 301
#        https://$host$request_uri; }` pattern. Same lint-friendly
#        simplification applied in 90-A's admin-constrai.conf.
#
#   - 90-D also adds the /admin.html anti-leak block: dist/admin.html is
#     the admin portal's entry HTML (90-C Vite multi-entry output) and
#     should only ever be served from admin.constrai.ca. Both server
#     blocks read from the same dist/ folder, so without this block a
#     curious client hitting app.constrai.ca/admin.html would render the
#     admin React shell on the wrong domain. The shell can't fetch any
#     /api/super data via this Host (vhost split's anti-leak guard 404s
#     all such requests, see 90-B), but cosmetic leakage is still worth
#     closing.

server {
    server_name app.constrai.ca 143.110.218.84;
    client_max_body_size 20M;

    # Frontend static files (Vite multi-entry build, 90-C).
    root /var/www/mep/mep-frontend/dist;
    index index.html;

    # Backend API proxy.
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host app.constrai.ca;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # User-uploaded files (Hub photos, profile avatars, etc).
    location /uploads/ {
        alias /var/www/mep/uploads/;
    }

    # 90-D anti-leak: dist/admin.html is the admin Vite entry HTML and
    # should only ever be served by admin.constrai.ca's server block.
    # Returning 404 here prevents the admin React shell from rendering on
    # the wrong domain.
    location = /admin.html {
        return 404;
    }

    # Frontend SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl;
    include /etc/nginx/snippets/cloudflare-ssl.conf;
}

server {
    listen 80;
    server_name app.constrai.ca 143.110.218.84;
    # Literal redirect target. Both server_name aliases redirect to the
    # canonical app.constrai.ca URL — direct-IP HTTP traffic gets bumped
    # onto HTTPS at the canonical hostname.
    return 301 https://app.constrai.ca$request_uri;
}
