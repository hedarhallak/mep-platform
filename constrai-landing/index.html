<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConstrAI — Construction Intelligence Platform</title>
  <meta name="description" content="ConstrAI is a workforce ERP platform built for MEP construction companies in Quebec. Coming soon.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='2' y='18' width='6' height='12' rx='2' fill='%232d3436' opacity='.7'/%3E%3Crect x='10' y='10' width='6' height='20' rx='2' fill='%232d3436' opacity='.85'/%3E%3Crect x='18' y='2' width='6' height='28' rx='2' fill='%233d5a2e'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --olive-dark: #3d5a2e;
      --olive: #4a6b38;
      --olive-light: #5a7a4a;
      --olive-bright: #7fb069;
      --charcoal: #2d3436;
      --gray-600: #6b7280;
      --gray-400: #9ca3af;
      --gray-200: #e5e7eb;
      --white: #ffffff;
      --bg: #fafbf9;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--charcoal);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(61,90,46,0.07) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(74,107,56,0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(90,122,74,0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    /* Language toggle */
    .lang-toggle {
      position: absolute;
      top: 24px;
      right: 24px;
      display: flex;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--gray-200);
      background: var(--white);
      z-index: 10;
    }
    .lang-btn {
      padding: 8px 16px;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      color: var(--gray-400);
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-btn.active {
      background: var(--olive-dark);
      color: var(--white);
    }
    .lang-btn:hover:not(.active) {
      color: var(--charcoal);
      background: #f3f4f6;
    }

    /* Logo */
    .logo-wrapper {
      margin-bottom: 48px;
    }
    .logo-wrapper svg {
      width: 300px;
      height: auto;
    }
    @media (min-width: 768px) {
      .logo-wrapper svg { width: 380px; }
    }

    /* Divider */
    .divider {
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, var(--olive-dark), var(--olive-light));
      border-radius: 2px;
      margin-bottom: 40px;
    }

    /* Coming soon */
    .coming-soon {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--olive);
      margin-bottom: 28px;
    }

    /* Headline */
    .headline {
      font-size: clamp(26px, 5vw, 40px);
      font-weight: 800;
      line-height: 1.25;
      color: var(--charcoal);
      margin-bottom: 56px;
      max-width: 540px;
    }
    .headline .accent {
      background: linear-gradient(135deg, var(--olive-dark), var(--olive-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Login button */
    .login-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: var(--olive-dark);
      color: var(--white);
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s;
      margin-bottom: 32px;
    }
    .login-btn:hover {
      background: var(--olive);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(61,90,46,0.25);
    }
    .login-btn svg {
      width: 18px;
      height: 18px;
    }

    /* Contact */
    .contact {
      font-size: 14px;
      color: var(--gray-400);
    }
    .contact a {
      color: var(--olive);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .contact a:hover {
      color: var(--olive-bright);
    }

    /* Footer */
    .footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 24px;
      font-size: 12px;
      color: var(--gray-400);
    }

    /* Animations */
    .fade-in {
      animation: fadeUp 0.8s ease-out both;
    }
    .fade-in:nth-child(2) { animation-delay: 0.1s; }
    .fade-in:nth-child(3) { animation-delay: 0.2s; }
    .fade-in:nth-child(4) { animation-delay: 0.3s; }
    .fade-in:nth-child(5) { animation-delay: 0.4s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Language toggle -->
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('en')" id="btn-en">EN</button>
      <button class="lang-btn" onclick="setLang('fr')" id="btn-fr">FR</button>
    </div>

    <!-- Logo (inline SVG — ConstrAI as one word) -->
    <div class="logo-wrapper fade-in">
      <svg viewBox="0 0 360 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="aiG" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#3d5a2e"/>
            <stop offset="100%" style="stop-color:#5a7a4a"/>
          </linearGradient>
          <linearGradient id="bG" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#5a7a4a"/>
            <stop offset="100%" style="stop-color:#3d5a2e"/>
          </linearGradient>
        </defs>
        <g transform="translate(10,15)">
          <rect x="0" y="42" width="12" height="28" rx="3" fill="#2d3436" opacity="0.7"/>
          <rect x="16" y="26" width="12" height="44" rx="3" fill="#2d3436" opacity="0.85"/>
          <rect x="32" y="10" width="12" height="60" rx="3" fill="url(#bG)"/>
          <circle cx="6" cy="38" r="2.5" fill="#5a7a4a"/>
          <circle cx="22" cy="22" r="2.5" fill="#5a7a4a"/>
          <circle cx="38" cy="6" r="2.5" fill="#5a7a4a"/>
          <line x1="6" y1="38" x2="22" y2="22" stroke="#5a7a4a" stroke-width="1.2" opacity="0.6"/>
          <line x1="22" y1="22" x2="38" y2="6" stroke="#5a7a4a" stroke-width="1.2" opacity="0.6"/>
        </g>
        <text x="65" y="62" font-family="Inter,Helvetica Neue,Arial,sans-serif" font-size="42" font-weight="700" letter-spacing="-1">
          <tspan fill="#2d3436">Constr</tspan><tspan fill="url(#aiG)">AI</tspan>
        </text>
        <text x="66" y="82" font-family="Inter,Helvetica Neue,Arial,sans-serif" font-size="11" font-weight="400" fill="#6b7280" letter-spacing="3.5">CONSTRUCTION INTELLIGENCE</text>
      </svg>
    </div>

    <!-- Divider -->
    <div class="divider fade-in"></div>

    <!-- Coming soon -->
    <p class="coming-soon fade-in" data-en="Coming Soon" data-fr="Bientot disponible">Coming Soon</p>

    <!-- Headline — just the tagline, no product details -->
    <h1 class="headline fade-in"
        data-en="The smarter way to manage <span class='accent'>construction</span> workforce"
        data-fr="La facon intelligente de gerer votre main-d'oeuvre en <span class='accent'>construction</span>">
      The smarter way to manage <span class="accent">construction</span> workforce
    </h1>

    <!-- Login button -->
    <a class="login-btn fade-in" href="https://app.constrai.ca"
       data-en="<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round'><path d='M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4'/><polyline points='10 17 15 12 10 7'/><line x1='15' y1='12' x2='3' y2='12'/></svg> Sign In"
       data-fr="<svg viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round'><path d='M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4'/><polyline points='10 17 15 12 10 7'/><line x1='15' y1='12' x2='3' y2='12'/></svg> Se connecter">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Sign In
    </a>

    <!-- Contact -->
    <p class="contact fade-in"
       data-en="<a href='mailto:info@constrai.ca'>info@constrai.ca</a>"
       data-fr="<a href='mailto:info@constrai.ca'>info@constrai.ca</a>">
      <a href="mailto:info@constrai.ca">info@constrai.ca</a>
    </p>

  </div>

  <footer class="footer">
    &copy; 2026 ConstrAI. Quebec, Canada.
  </footer>

  <script>
    function setLang(lang) {
      document.querySelectorAll('[data-en]').forEach(function(el) {
        el.innerHTML = el.getAttribute('data-' + lang);
      });
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
      document.getElementById('btn-fr').classList.toggle('active', lang === 'fr');
      document.documentElement.lang = lang === 'fr' ? 'fr' : 'en';
      localStorage.setItem('constrai_lang', lang);
    }

    (function() {
      var saved = localStorage.getItem('constrai_lang');
      if (saved) { setLang(saved); return; }
      var nav = (navigator.language || '').toLowerCase();
      if (nav.startsWith('fr')) { setLang('fr'); }
    })();
  </script>

</body>
</html>
