server {
    listen 80;
    server_name www.constrai.ca constrai.ca;
    return 301 https://www.constrai.ca$request_uri;
}

server {
    listen 443 ssl;
    server_name constrai.ca;

    ssl_certificate /etc/letsencrypt/live/constrai.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/constrai.ca/privkey.pem;

    return 301 https://www.constrai.ca$request_uri;
}

server {
    listen 443 ssl;
    server_name www.constrai.ca;

    ssl_certificate /etc/letsencrypt/live/constrai.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/constrai.ca/privkey.pem;

    root /var/www/constrai-landing;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(svg|png|jpg|ico|css|js|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
